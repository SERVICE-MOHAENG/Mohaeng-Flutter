name: mohaeng_app_service
description: "AI Expo 모행 Flutter 프로젝트입니다."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_riverpod: ^2.6.1
  dio: ^5.9.0
  json_annotation: ^4.10.0
  kakao_flutter_sdk_user: ^1.10.0
  flutter_naver_login: ^2.1.1
  google_sign_in: ^6.2.2
  pinput: ^6.0.1
  flutter_earth_globe: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.10.5
  flutter_lints: ^6.0.0
  json_serializable: ^6.12.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/logo/
    - assets/images/icons/
    - assets/images/country/
    - assets/images/companion/
    - assets/images/concept/
    - assets/images/travel_style/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Thin.otf
          weight: 100
        - asset: assets/fonts/Pretendard-ExtraLight.otf
          weight: 200
        - asset: assets/fonts/Pretendard-Light.otf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
        - asset: assets/fonts/Pretendard-Black.otf
          weight: 900

    - family: GmarketSansBold
      fonts:
        - asset: assets/fonts/GmarketSansBold.otf

    - family: GmarketSansMedium
      fonts:
        - asset: assets/fonts/GmarketSansMedium.otf
